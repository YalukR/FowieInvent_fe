<div class="flex align-items-center justify-content-between gap-3 flex-wrap mb-2">
  <div class="flex align-items-center gap-1">
    <button
      type="button"
      class="p-button p-button-text p-button-secondary p-button-sm"
      (click)="goBack()"
      style="padding: 0.4rem 0.5rem;">
      <i class="pi pi-arrow-left text-sm"></i>
    </button>
    @for (item of items; track item.route) {
      <a [routerLink]="item.route"
        class="p-button p-button-text p-button-sm flex align-items-center gap-1"
        [class.p-button-secondary]="!isActive(item.route)"
        style="text-decoration: none;">
        <i [class]="item.icon + ' text-sm'"></i>
        <span class="hidden md:inline">{{ item.label }}</span>
      </a>
    }
  </div>
  <div class="hidden md:flex align-items-center gap-2">
    <ng-content />
  </div>
</div>
