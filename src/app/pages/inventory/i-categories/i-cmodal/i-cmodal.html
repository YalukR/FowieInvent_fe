<!-- src/app/pages/inventory/i-categories/i-cmodal/i-cmodal.html -->
<p-dialog
    [header]="title"
    [visible]="visible()"
    (visibleChange)="!$event && onClose()"
    (onShow)="onShow()"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    styleClass="w-full"
    [style]="{ maxWidth: '400px' }">

    <div class="flex flex-col gap-4 py-2">

        @if (error) {
        <p-message severity="error" [text]="error" styleClass="w-full"></p-message>
        }

        <!-- Nombre -->
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre <span class="text-red-400">*</span></label>
            <input pInputText [(ngModel)]="nombre" placeholder="Ej. Electrónica" class="w-full" />
        </div>

        <!-- Activo (solo en edición) -->
        @if (isEdit) {
        <div class="flex align-items-center justify-content-between">
            <label class="font-medium text-sm">Activo</label>
            <p-toggleswitch [(ngModel)]="activo" />
        </div>
        }

    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <p-button
                label="Cancelar"
                severity="secondary"
                [outlined]="true"
                (onClick)="onClose()"
                [disabled]="loading">
            </p-button>
            <p-button
                [label]="isEdit ? 'Guardar cambios' : 'Crear categoría'"
                [loading]="loading"
                (onClick)="onSave()">
            </p-button>
        </div>
    </ng-template>

</p-dialog>
