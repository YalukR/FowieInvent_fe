<!-- src/app/pages/inventory/i-dashboard/i-dashboard.html -->
<div class="flex flex-col gap-4">

    <!-- Header -->
    <div class="flex align-items-center justify-content-between">
        <div>
            <p class="text-muted-color text-sm mt-1 mb-0">{{ productos.length }} productos registrados</p>
        </div>
        <div class="flex gap-2">
            <p-button label="Nuevo producto" icon="pi pi-plus" size="small"></p-button>
            <p-button label="Exportar" icon="pi pi-file-export" severity="secondary" [outlined]="true"
                size="small"></p-button>
        </div>
    </div>

    <!-- Tabla -->
    <p-table
        [value]="productos"
        [paginator]="true"
        [rows]="8"
        [rowsPerPageOptions]="[8, 15, 30]"
        [globalFilterFields]="['nombre', 'categoria', 'unidad_medida']"
        dataKey="id"
        styleClass="p-datatable-sm"
        [tableStyle]="{ 'width': '100%' }"
        [scrollable]="true"
        scrollHeight="flex"
        #dt>

        <ng-template pTemplate="caption">
            <div class="flex justify-content-end">
                <p-iconfield>
                    <p-inputicon styleClass="pi pi-search" />
                    <input pInputText type="text" placeholder="Buscar producto..."
                        (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="nombre">
                    Nombre <p-sortIcon field="nombre" />
                </th>
                <th pSortableColumn="categoria" class="hidden md:table-cell">
                    Categoría <p-sortIcon field="categoria" />
                </th>
                <th class="hidden md:table-cell">
                    Unidad
                </th>
                <th pSortableColumn="stock_actual" style="text-align:center">
                    Stock <p-sortIcon field="stock_actual" />
                </th>
                <th class="hidden md:table-cell" style="text-align:center">
                    Stock mín.
                </th>
                <th style="text-align:center">
                    Estado
                </th>
                <th class="hidden md:table-cell" style="text-align:center">
                    Activo
                </th>
                <th pFrozenColumn alignFrozen="right" style="text-align:center; min-width: 7rem;">
                    Acciones
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-producto>
            <tr>
                <td class="font-medium">{{ producto.nombre }}</td>
                <td class="hidden md:table-cell">
                    <span class="text-sm px-2 py-1 border-round"
                        style="background: var(--surface-100); border: 1px solid var(--surface-border);">
                        {{ producto.categoria }}
                    </span>
                </td>
                <td class="hidden md:table-cell text-muted-color text-sm">
                    {{ producto.unidad_medida }}
                </td>
                <td style="text-align:center">
                    <span class="font-bold"
                        [style.color]="producto.stock_actual === 0 ? 'var(--p-red-500)' :
                                       producto.stock_actual <= producto.stock_minimo ? 'var(--p-orange-500)' :
                                       'var(--p-green-500)'">
                        {{ producto.stock_actual }}
                    </span>
                </td>
                <td class="hidden md:table-cell text-muted-color" style="text-align:center">
                    {{ producto.stock_minimo }}
                </td>
                <td style="text-align:center">
                    <p-tag [value]="getStockLabel(producto)" [severity]="getStockSeverity(producto)">
                    </p-tag>
                </td>
                <td class="hidden md:table-cell" style="text-align:center">
                    <i class="pi"
                        [ngClass]="producto.activo ? 'pi-check-circle text-green-500' : 'pi-times-circle text-red-400'">
                    </i>
                </td>
                <td pFrozenColumn alignFrozen="right" style="text-align:center; min-width: 7rem;">
                    <div class="flex gap-1 justify-content-center">
                        <p-button icon="pi pi-eye"    severity="secondary" [text]="true" size="small" />
                        <p-button icon="pi pi-pencil" severity="secondary" [text]="true" size="small" />
                        <p-button icon="pi pi-trash"  severity="danger"    [text]="true" size="small" />
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8" class="text-center text-muted-color py-6">
                    <i class="pi pi-box text-4xl mb-3 block opacity-30"></i>
                    No hay productos registrados.
                </td>
            </tr>
        </ng-template>

    </p-table>

</div>
