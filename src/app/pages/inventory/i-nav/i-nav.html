<div class="flex align-items-center justify-content-between gap-2 p-1 mb-4 border-round surface-card surface-border w-full">

    <div class="flex align-items-center gap-1">

        <p-button
            label="Volver"
            icon="pi pi-arrow-left"
            severity="secondary"
            [text]="true"
            size="small"
            (onClick)="goBack()">
        </p-button>

        <div class="border-left-1 surface-border mx-1" style="height: 1.25rem;"></div>

        @for (item of navItems; track item.route) {
        <p-button
            [label]="item.label"
            [icon]="item.icon"
            [severity]="isActive(item.route) ? 'primary' : 'secondary'"
            [text]="!isActive(item.route)"
            size="small"
            [routerLink]="item.route">
        </p-button>
        }

    </div>

    <div class="flex align-items-center gap-1 ml-auto">
        <ng-content></ng-content>
    </div>

</div>
