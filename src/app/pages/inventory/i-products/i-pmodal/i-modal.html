<!-- src/app/pages/inventory/i-modal/i-modal.html -->
<p-dialog [header]="title" [visible]="visible()" (visibleChange)="!$event && onClose()" (onShow)="onShow()"
    [modal]="true" [draggable]="false" [resizable]="false" styleClass="w-full" [style]="{ maxWidth: '480px' }">

    <div class="flex flex-col gap-4 py-2">

        @if (error) {
        <p-message severity="error" [text]="error" styleClass="w-full"></p-message>
        }

        <!-- Nombre -->
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre <span class="text-red-400">*</span></label>
            <input pInputText [(ngModel)]="nombre" placeholder="Ej. Laptop Dell XPS" class="w-full" />
        </div>

        <!-- Categoría -->
        <div class="flex flex-col gap-1">
            <div class="flex align-items-center justify-content-between mb-2">
                <label class="font-medium text-sm">Categoría <span class="text-red-400">*</span></label>
                <button type="button" class="text-xs cursor-pointer border-none bg-transparent p-0"
                    [style.color]="showNuevaCategoria ? 'var(--p-red-500)' : 'var(--p-primary-500)'"
                    (click)="toggleNuevaCategoria()">
                    <i class="pi" [ngClass]="showNuevaCategoria ? 'pi-times' : 'pi-plus'"></i>
                    {{ showNuevaCategoria ? 'Cancelar' : 'Nueva categoría' }}
                </button>
            </div>

            <!-- Select existente -->
            @if (!showNuevaCategoria) {
            <p-select [(ngModel)]="categoria_id" [options]="categorias" optionLabel="nombre" optionValue="id"
                placeholder="Selecciona una categoría" [filter]="true" filterPlaceholder="Buscar..."
                styleClass="w-full">
            </p-select>
            }

            <!-- Inline nueva categoría -->
            @if (showNuevaCategoria) {
            <div class="flex flex-col gap-2 p-3 border-round"
                style="border: 1px solid var(--p-primary-200); background: var(--surface-50);">
                <span class="text-xs text-muted-color">Nueva categoría</span>
                @if (errorCategoria) {
                <p-message severity="error" [text]="errorCategoria" styleClass="w-full"></p-message>
                }
                <div class="flex gap-2">
                    <input pInputText [(ngModel)]="nuevaCategoriaName" placeholder="Ej. Electrónica" class="w-full"
                        (keyup.enter)="crearCategoria()" />
                    <p-button label="Crear" size="small" [loading]="loadingCategoria" (onClick)="crearCategoria()">
                    </p-button>
                </div>
            </div>
            }
        </div>

        <!-- Unidad de medida -->
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Unidad de medida <span class="text-red-400">*</span></label>
            <input pInputText [(ngModel)]="unidad_medida" placeholder="Ej. pieza, kg, litro" class="w-full" />
        </div>

        <!-- Stock -->
        <div class="flex gap-3">
            <div class="flex flex-col gap-1 flex-1">
                <label class="font-medium text-sm">
                    Stock inicial
                    @if (isEdit) {
                    <span class="text-muted-color text-xs">(solo lectura)</span>
                    }
                </label>
                <p-inputnumber [(ngModel)]="stock_actual" [min]="0" [disabled]="isEdit" styleClass="w-full">
                </p-inputnumber>
            </div>
            <div class="flex flex-col gap-1 flex-1">
                <label class="font-medium text-sm">Stock mínimo</label>
                <p-inputnumber [(ngModel)]="stock_minimo" [min]="0" styleClass="w-full">
                </p-inputnumber>
            </div>
        </div>

        @if(isEdit){
            <div class="flex flex-col gap-1">
                <span class="text-xs text-muted-color">
                    {{ activo ? 'Activo' : 'Inactivo' }}
                </span>
            </div>
            <p-toggleswitch [(ngModel)]="activo" />
        }

    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onClose()"
                [disabled]="loading">
            </p-button>
            <p-button [label]="isEdit ? 'Guardar cambios' : 'Crear producto'" [loading]="loading" (onClick)="onSave()">
            </p-button>
        </div>
    </ng-template>

</p-dialog>
